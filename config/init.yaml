---
# By default this config loads hd-driver-auth-github from the remote driver
# registry. To use a pre-fetched local binary instead, load this repo with:
#
# repos:
#   - repo: <this repo>
#     options:
#       use_local_binary: true
#
# Optional repo options for the remote case:
#   registry: override the named registry (default: charles-gh-pages)
#   channel: override the release channel (default: stable)
#   version: pin an exact release version
drivers:
  daemon:
    drivers:
      auth-github:
        name: auth-github
        type: '{% if .options.use_local_binary %}builtin{% else %}remote{% end %}'
        handlerData:
{% if .options.use_local_binary %}
          shortName: hd-driver-auth-github
{% else %}
          registry: '{% default "charles-gh-pages" .options.registry %}'
          channel: '{% default "stable" .options.channel %}'
{% if .options.version %}
          version: '{% .options.version %}'
{% end %}
{% end %}
    services:
      api:
        description: Honeydipper API service with GitHub OAuth
        auth-providers:
          - auth-github
        auth:
          casbin:
            policies+:
              - |
                p, org:owners, gh_event, read, auth-github
                p, org:maintainers, gh_event, read, auth-github
                p, org:members, gh_event, read, auth-github
                p, org:collaborators, gh_event, read, auth-github
                p, repo:owners, gh_event, read, auth-github
                p, repo:maintainers, gh_event, read, auth-github
                p, repo:members, gh_event, read, auth-github
                p, repo:collaborators, gh_event, read, auth-github

                p, org:owners, gh_secret, write, auth-github
                p, org:maintainers, gh_secret, write, auth-github
                p, repo:owners, gh_secret, write, auth-github
                p, repo:maintainers, gh_secret, write, auth-github
  auth-github:
    # GitHub OAuth Application credentials
    # These can be set via environment variables:
    # GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET
    client_id: $nil
    client_secret: $nil

    # OAuth redirect URI - must match GitHub App configuration
    redirect_uri: https://your-domain/auth/github/callback

    # Optional: Restrict access to specific GitHub usernames (case-insensitive)
    allowed_users: []
    # Example with users:
    # allowed_users:
    #   - octocat
    #   - alice

    # Optional: Restrict access to specific GitHub organizations
    allowed_orgs: []
    # Example with organizations:
    # allowed_orgs:
    #   - my-org
    #   - another-org

    # Behavior when both allowed_users and allowed_orgs are empty.
    # true keeps legacy behavior (allow any authenticated GitHub user).
    # false requires explicit allowlists.
    allow_when_no_restrictions: false

    # Optional: Restrict access to specific teams
    # Format: org:team
    allowed_teams: []
    # Example with teams:
    # allowed_teams:
    #   - my-org:backend
    #   - my-org:devops

    # JWT session token settings
    token_expiration: 86400  # 24 hours in seconds

    # User information cache settings
    cache_ttl: 3600  # Cache entries expire after 1 hour
    cache_size: 1000  # Maximum number of cached users
