name: Release And Update Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (for example v0.2.0)"
        required: true

jobs:
  release:
    uses: Charles546/honeydipper-registry/.github/workflows/release-driver.yml@main
    with:
      driver_name: hd-driver-auth-github
      binary_name: hd-driver-auth-github
      go_build_path: ./cmd/hd-driver-auth-github
      release_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      manifest_file: hd-driver-auth-github.json
      mirror_url: https://charles546.github.io/honeydipper-registry/artifacts/hd-driver-auth-github/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}/linux-amd64/hd-driver-auth-github
    secrets:
      registry_repo_token: ${{ secrets.REGISTRY_REPO_TOKEN }}
